{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AuditAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6d28d9;
            --primary-hover: #5b21b6;
            --bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --input-bg: #f8fafc;
            --border: #e2e8f0;
            --danger: #dc2626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(#e2e8f0 0.8px, transparent 0.8px);
            background-size: 24px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container { width: 100%; display: flex; justify-content: center; align-items: center; padding: 20px; }

        .login-box {
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            text-align: center;
        }

        .logo-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.04em;
            color: var(--text-main);
        }

        .logo-area span { color: var(--primary); }

        .login-box h2 { margin-bottom: 8px; color: var(--text-main); font-size: 1.5rem; font-weight: 700; }

        .login-box p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 32px; }

        .input-group { margin-bottom: 18px; text-align: left; }

        .input-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-main); margin-bottom: 6px; }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--input-bg);
            color: var(--text-main);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(109, 40, 217, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(109, 40, 217, 0.2);
        }

        .error { color: var(--danger); margin-top: 16px; font-size: 0.85rem; font-weight: 500; min-height: 1.25rem; }

        .footer-links { margin-top: 24px; font-size: 0.85rem; color: var(--text-muted); }

        .footer-links a { color: var(--primary); text-decoration: none; font-weight: 600; }

        @media (max-width: 480px) { .login-box { padding: 30px 20px; } }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-box">
        <div class="logo-area">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6d28d9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            Audit<span>AI</span>
        </div>
        
        <h2>Welcome Back</h2>
        <p>Enter your credentials to access the portal</p>

        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="admin">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button onclick="login()">Sign In to Dashboard</button>

        <div id="error" class="error"></div>

        <div class="footer-links">
            Don't have access? <a href="#">Contact Administrator</a>
        </div>
    </div>
</div>

<script>
function login() {
    const userField = document.getElementById("username").value;
    const passField = document.getElementById("password").value;
    const errorDiv = document.getElementById("error");
    
    errorDiv.innerText = ""; 

    // THE DUMMY CHECK
    if (userField === "admin" && passField === "admin123") {
        // Redirecting to your "pro_dashboard" name from urls.py
        window.location.href = "{% url 'pro_dashboard' %}";
    } else {
        errorDiv.innerText = "Invalid credentials. Try admin / admin123";
    }
}
</script>

</body>
</html>
