<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuditAI | Professional Intelligence</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-purple: #7c3aed;
            --primary-hover: #6d28d9;
            --nav-bg: rgba(255, 255, 255, 0.9);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --bg-body: #f8fafc;
        }

        body {
            background-color: var(--bg-body);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        /* Sleek Glassmorphism Navbar */
        .navbar {
            background: var(--nav-bg) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e2e8f0;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            color: var(--primary-purple) !important;
            letter-spacing: -0.5px;
            font-size: 1.4rem;
        }

        .nav-link {
            color: var(--text-muted) !important;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            margin: 0 10px;
            transition: all 0.2s ease;
            position: relative;
        }

        .nav-link:hover {
            color: var(--primary-purple) !important;
        }

        /* Active Link Indicator */
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: var(--primary-purple);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* Profile/Dashboard Button Style */
        .nav-btn {
            background: var(--primary-purple);
            color: white !important;
            border-radius: 8px;
            padding: 8px 20px !important;
            margin-left: 15px;
        }

        .nav-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .nav-btn::after {
            display: none;
        }

        /* Container Spacing */
        .main-content {
            padding-top: 20px;
            padding-bottom: 50px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-purple);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand" href="{% url 'pro_dashboard' %}">
                AuditAI <span style="font-weight: 400; color: var(--text-muted);">PRO</span>
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#proNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="proNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'project_audit' %}">Budgets</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'reimbursement_audit' %}">Expenses</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'approval_system' %}">Governance</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-btn" href="{% url 'pro_dashboard' %}">Dashboard</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container main-content">
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Smooth fade-in for all page content
            const content = document.querySelector('.main-content');
            content.style.opacity = '0';
            content.style.transition = 'opacity 0.5s ease-in-out';
            setTimeout(() => content.style.opacity = '1', 50);
        });
    </script>

</body>
</html>
