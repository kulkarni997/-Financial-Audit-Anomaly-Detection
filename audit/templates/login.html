{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - AuditAI</title>

    <link rel="stylesheet" href="{% static 'css/main.css' %}">

    <style>
        :root {
            --login-bg: linear-gradient(130deg, #081021 0%, #0f203f 100%);
            --login-box-bg: rgba(12, 24, 47, 0.84);
            --login-box-border: rgba(79, 118, 175, 0.4);
            --login-text: #e8edf5;
            --login-muted: #94a3b8;
            --login-input-bg: rgba(3, 12, 28, 0.8);
            --login-input-border: #334155;
            --login-btn: #3b82f6;
            --login-btn-hover: #2563eb;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            align-items: center !important;
        }

        .login-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--login-bg);
            padding: 30px;
        }

        .login-box {
            width: min(420px, 100%);
            background: var(--login-box-bg);
            padding: 32px;
            border-radius: 16px;
            border: 1px solid var(--login-box-border);
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
        }

        .login-box h2 {
            margin-bottom: 20px;
            color: var(--text-primary);
            font-size: 1.8rem;
            letter-spacing: 0.02em;
        }

        .input-group {
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--login-input-border);
            border-radius: 10px;
            background: var(--login-input-bg);
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        input::placeholder {
            color: var(--login-muted);
        }

        button {
            width: 100%;
            padding: 12px 14px;
            background: var(--login-btn);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: background 160ms ease;
        }

        button:hover {
            background: var(--login-btn-hover);
        }

        .error {
            color: #fca5a5;
            margin-top: 10px;
            font-size: 0.92rem;
            min-height: 1.25rem;
        }

        @media (max-width: 680px) {
            .navbar { display: none; }
            .login-box { width: 100%; padding: 24px; }
        }
    </style>
</head>

<body>

<div class="login-container">
    <div class="login-box">
        <h2>Login</h2>

        <div class="input-group">
            <input type="text" id="username" placeholder="Username">
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
        </div>

        <button onclick="login()">Login</button>

        <div id="error" class="error"></div>
    </div>
</div>

<script>
async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    try {
        const res = await fetch("/api/auth/login/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
            throw new Error(data.detail || "Login failed");
        }

        // ✅ store tokens
        localStorage.setItem("access_token", data.access);
        localStorage.setItem("refresh_token", data.refresh);

        // ✅ redirect
        window.location.href = "/dashboard/";

    } catch (err) {
        document.getElementById("error").innerText = err.message;
    }
}
</script>

</body>
</html>
