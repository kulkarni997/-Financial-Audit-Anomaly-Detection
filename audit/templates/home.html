{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AuditAI</title>

    <link rel="stylesheet" href="{% static 'css/main.css' %}">

    <style>
        html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: var(--font-sans);
    background: radial-gradient(circle at top left, #1e293b, #020617);
    color: white;
}

body {
    display: flex;
    flex-direction: column;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 30px 60px;
    flex-shrink: 0;
    z-index: 10;
}

.logo {
    font-size: 20px;
    font-weight: 600;
}

.login-btn {
    padding: 8px 18px;
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(6px);
    color: white;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.2);
}

.home {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 100%;
}

/* HERO LAYOUT */
.hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 64px;
    max-width: 1100px;
    width: min(100%, 1100px);
    padding: 0 30px;
    text-align: center;
}

/* LEFT SIDE */
.hero-left {
    max-width: 560px;
    margin: 0 auto;
}

.hero-left h1 {
    font-size: 56px;
    line-height: 1.08;
    margin-bottom: 18px;
}

.hero-left p {
    color: #cbd5e1;
    margin-bottom: 32px;
    font-size: 19px;
    max-width: 470px;
}

.hero-right {
    display: flex;
    justify-content: center;
    width: 100%;
}

.glass-card {
    width: 100%;
    max-width: 360px;
    border-radius: 18px;
    background: rgba(15, 23, 42, 0.68);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(148, 163, 184, 0.2);
    box-shadow: 0 28px 40px rgba(0, 0, 0, 0.24);
    padding: 24px;
}

.stat {
    margin-bottom: 16px;
}

.stat-title {
    font-size: 11px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: .09em;
}

.stat-value {
    font-size: 24px;
    font-weight: 700;
    color: #e2e8f0;
}

@media (max-width: 960px) {
    .hero {
        min-height: calc(100vh - 120px);
    }
    .navbar {
        padding: 20px 30px;
    }
}

@media (max-width: 640px) {
    .navab {  }
    .hero-left h1 { font-size: 40px; }
    .hero-left p { font-size: 16px; }
    .cta { width: 100%; text-align: center; }
}

/* BUTTON spacing fix */
.cta {
    display: inline-block;
    padding: 14px 28px;
    background: linear-gradient(135deg, #2563EB, #3b82f6);
    border-radius: 12px;
    color: white;
    text-decoration: none;
    font-weight: 500;
}

.cta:hover {
    transform: translateY(-2px);
}

/* RIGHT SIDE CARD */
.hero-right {
    display: flex;
    justify-content: center;
}

.glass-card {
    width: 320px;
    height: 200px;
    border-radius: 16px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    padding: 20px;
}

/* FAKE STATS */
.stat {
    margin-bottom: 15px;
}

.stat-title {
    font-size: 12px;
    color: #94a3b8;
}

.stat-value {
    font-size: 20px;
    font-weight: 600;
}
    </style>
</head>

<body>

<div class="home">

    <!-- 🔹 NAV -->
    <div class="navbar">
        <div class="logo">AuditAI</div>
    </div>

    <!-- 🔹 HERO -->
    <div class="hero">
        <div class="hero-left">
            <h1>AI Financial Audit</h1>
            <p>Detect anomalies. Reduce risk. Automate audits with high-precision AI insights.</p>
            <a href="/login/" class="cta">Get Started</a>
        </div>
    </div>

</div>

</body>
</html>
